<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书评论弹幕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 100%);
            font-family: 'Orbitron', 'Courier New', monospace;
        }

        #danmuCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .control-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(139, 92, 246, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-label {
            color: #8b5cf6;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .speed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, #06b6d4, #8b5cf6, #f472b6);
            border-radius: 2px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #f8fafc;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6;
        }

        .speed-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #f8fafc;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6;
        }

        .speed-value {
            color: #f8fafc;
            font-size: 14px;
            min-width: 60px;
            text-align: right;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .loading-text {
            color: #8b5cf6;
            font-size: 18px;
            letter-spacing: 4px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">INITIALIZING DATA STREAM...</div>
    </div>
    <canvas id="danmuCanvas"></canvas>
    <div class="control-panel">
        <span class="control-label">Speed</span>
        <input type="range" class="speed-slider" id="speedSlider" min="1" max="3" value="2" step="1">
        <span class="speed-value" id="speedValue">MEDIUM</span>
    </div>
</body>
</html>
